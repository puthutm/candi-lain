      - SSO_OAUTH_AUTHORIZE_URL=http://10.10.20.56:3000/oauth/authorize
      - SSO_OAUTH_USERINFO_URL=http://10.10.20.56:3000/oauth/userinfo
      - NEXTAUTH_SECRET=super-secret-nextauth-key-lms-platform-2026
      - SSO_OAUTH_CALLBACK_URL=http://10.10.20.56:3004/api/auth/callback/unsia-sso
      - NEXT_PUBLIC_APP_URL=http://10.10.20.56:3004

