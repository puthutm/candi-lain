services:
  db:
    image: postgres:16-alpine
    container_name: erp-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sso_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sso_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate-all:
    image: node:20-alpine
    container_name: erp-migrate-all
    working_dir: /workspace
    volumes:
      - ./:/workspace
    depends_on:
      db:
        condition: service_healthy
    command: sh /workspace/docker/migrate-all.sh
    restart: "no"


  sso-platform:
    build:
      context: ./sso-platform
      dockerfile: Dockerfile
    container_name: erp-sso-platform
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate-all:
        condition: service_completed_successfully
    env_file:
      - path: ./sso-platform/.env
        required: false
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sso_platform
      - REDIS_URL=redis://redis:6379
      - NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=erp-unsia-sso-server-actions-key-2026
      - SESSION_COOKIE_SECURE=false

  reference-data:
    build:
      context: ./reference-data
      dockerfile: Dockerfile
    container_name: erp-reference-data
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate-all:
        condition: service_completed_successfully
    env_file:
      - path: ./reference-data/.env
        required: false
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/reference_data
      - REDIS_URL=redis://redis:6379

  pmb-platform:
