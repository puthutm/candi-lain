services:
  db:
    image: postgres:16-alpine
    container_name: erp-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sso_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sso_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate-all:
    image: node:20-alpine
    container_name: erp-migrate-all
    working_dir: /workspace
    volumes:
      - ./:/workspace
    depends_on:
      db:
        condition: service_healthy
    command: sh /workspace/docker/migrate-all.sh
    restart: "no"


  seed-superadmin:
    image: node:20-alpine
    container_name: erp-seed-superadmin
    working_dir: /workspace
    volumes:
      - ./:/workspace
    depends_on:
      db:
        condition: service_healthy
      migrate-all:
        condition: service_completed_successfully
    command: sh /workspace/docker/seed-superadmin.sh
    restart: "no"

  sso-platform:
    build:
      context: ./sso-platform
      dockerfile: Dockerfile
    container_name: erp-sso-platform
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate-all:
        condition: service_completed_successfully
      seed-superadmin:
        condition: service_completed_successfully
    env_file:
      - path: ./sso-platform/.env
        required: false
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sso_platform
      - REDIS_URL=redis://redis:6379
      - NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=erp-unsia-sso-server-actions-key-2026
      - SESSION_COOKIE_SECURE=false
      # Use correct public callback URLs for each platform (different ports per service)
      - SEED_PMB_CALLBACK_URL=http://10.10.20.56:3002/api/auth/callback
      - SEED_SIAKAD_CALLBACK_URL=http://10.10.20.56:3003/api/auth/callback
      - SEED_LMS_CALLBACK_URL=http://10.10.20.56:3004/api/auth/callback
      - SEED_KEUANGAN_CALLBACK_URL=http://10.10.20.56:3005/api/auth/callback
      - SEED_HRIS_CALLBACK_URL=http://10.10.20.56:3006/api/auth/callback
      - SEED_BANK_KONTEN_CALLBACK_URL=http://10.10.20.56:3007/api/auth/callback
      # Enable to force re-seed and update redirect URIs: SSO_SEED_FORCE=true

  reference-data:
    build:
      context: ./reference-data
      dockerfile: Dockerfile
    container_name: erp-reference-data
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate-all:
        condition: service_completed_successfully
    env_file:
      - path: ./reference-data/.env
        required: false
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/reference_data
      - REDIS_URL=redis://redis:6379

  pmb-platform:
    build:
      context: ./pmb-platform
      dockerfile: Dockerfile
    container_name: erp-pmb-platform
    restart: unless-stopped
    ports:
      - "3002:3002"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate-all:
        condition: service_completed_successfully
    env_file:
      - path: ./pmb-platform/.env
        required: false
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/pmb_platform
      - REDIS_URL=redis://redis:6379
      - SSO_OAUTH_TOKEN_URL=http://10.10.20.56:3000/oauth/token
      - SSO_OAUTH_AUTHORIZE_URL=http://10.10.20.56:3000/oauth/authorize
      - SSO_OAUTH_USERINFO_URL=http://10.10.20.56:3000/oauth/userinfo
      # Auth.js / NextAuth — use public IP so callbacks match the request host (prevents "Configuration" error)
      - NEXTAUTH_URL=http://10.10.20.56:3002
      - AUTH_URL=http://10.10.20.56:3002/api/auth
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_SECRET=super-secret-nextauth-key-pmb-platform-2026
      - SSO_OAUTH_CALLBACK_URL=http://10.10.20.56:3002/api/auth/callback/unsia-sso
      - NEXT_PUBLIC_APP_URL=http://10.10.20.56:3002
      - NEXT_PUBLIC_API_URL=http://10.10.20.56:3002/api
      - SSO_OAUTH_CLIENT_ID=pmb-platform
      - SSO_OAUTH_CLIENT_SECRET=pmb-platform-client-secret-key-2026

  siakad-platform:
    build:
      context: ./siakad-platform
      dockerfile: Dockerfile
    container_name: erp-siakad-platform
    restart: unless-stopped
    ports:
