        required: false
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/siakad_platform
      - REDIS_URL=redis://redis:6379
      - SSO_OAUTH_TOKEN_URL=http://10.10.20.56:3000/oauth/token
      - SSO_OAUTH_AUTHORIZE_URL=http://10.10.20.56:3000/oauth/authorize
      - SSO_OAUTH_USERINFO_URL=http://10.10.20.56:3000/oauth/userinfo
      - NEXTAUTH_SECRET=super-secret-nextauth-key-siakad-platform-2026
      - SSO_OAUTH_CALLBACK_URL=http://10.10.20.56:3003/api/auth/callback/unsia-sso
      - NEXT_PUBLIC_APP_URL=http://10.10.20.56:3003

  lms-platform:
